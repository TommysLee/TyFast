<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
  <meta charset="UTF-8">
  <title>关联机构模块 - TyFast Platform</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
  <!--/* 关联机构模块代码片段 */-->
  <th:block th:fragment="related">
    <!-- 右侧抽屉窗口 :: 关联机构树 -->
    <v-navigation-drawer :order="-1" v-model="winRelatedDrawer" temporary floating location="right" :width="winDrawerWidth">
      <v-layout full-height>
        <v-sheet class="w-100 overflow-auto">
          <v-app-bar flat color="indigo-darken-2">
            <v-toolbar-title class="text-subtitle-1 font-weight-bold">
              {{selectedItemName}}：{{$t('关联')}}{{$t('机构')}}
            </v-toolbar-title>
            <v-spacer></v-spacer>
            <v-btn icon="mdi-close" @click="closeWinRelatedDrawer"></v-btn>
          </v-app-bar>
          <v-card flat tile :loading="loading" class="mt-16 mb-8">
            <v-container class="pt-0">
              <v-treeview
                  class="treeview-bg-transparent"
                  color="primary"
                  density="compact"
                  open-all
                  selectable
                  select-strategy="independent"
                  item-value="orgId"
                  item-title="orgName"
                  :items="orgTreeData"
                  v-model="relatedForm.ids"
              ></v-treeview>
            </v-container>
          </v-card>
        </v-sheet>
        <v-footer app class="border-t-thin justify-end">
          <v-btn variant="outlined" class="mr-4" :disabled="posting" @click="closeWinRelatedDrawer">{{$t('关闭')}}</v-btn>
          <v-btn color="info" :loading="posting" @click="doRelatedSubmit" shiro:hasPermission="/system/uorg/save">{{$t('保存')}}</v-btn>
        </v-footer>
      </v-layout>
    </v-navigation-drawer>

    <!-- 业务js -->
    <script type="text/javascript" th:src="@{/js/system/user/uorg-related.js?_t=#buildtime#}"></script>
  </th:block>
</body>
</html>
