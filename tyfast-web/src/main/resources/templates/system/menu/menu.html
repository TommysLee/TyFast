<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
  <!--/* 共用JS与CSS */-->
  <th:block th:replace="~{assets/include :: scriptcss_default('菜单管理')}"/>
</head>
<body>
  <div id="app" v-cloak>
    <v-app>
      <!-- 左侧区域::导航菜单 -->
      <th:block th:replace="~{assets/include :: navMenu}"/>

      <!-- 顶部功能区 -->
      <v-app-bar flat>
        <th:block th:replace="~{assets/include :: header}"/>
      </v-app-bar>

      <!-- 主体部分 -->
      <v-main>
        <!-- 主体容器 -->
        <v-container fluid>
          <v-sheet class="rounded-0 px-6 py-3">
            <!-- 树数据表格 -->
            <v-row shiro:hasPermission="/system/menu/save">
              <v-col class="pb-0">
                <v-btn color="primary" class="pr-5 pl-4" @click="openFormDialog($t('新增')+$t('菜单'))">
                  <v-icon size="small">mdi-plus</v-icon>
                  {{$t('新增')}}
                </v-btn>
              </v-col>
            </v-row>

            <v-row>
              <v-col>
                <v-progress-linear :active="loading" color="primary" indeterminate rounded></v-progress-linear>
                <v-treeview color="primary" open-on-click item-value="menuId" item-title="menuName" :items="datatable.items" class="bg-transparent tree-datatable" :open-all="datatable.items.length < 4">
                  <template v-slot:title="{ item }">
                    <v-row v-if="item.disabled">
                      <v-col v-for="header in item.headers" :style="'text-align:' + header.align">
                        {{$t(header.title)}}
                      </v-col>
                    </v-row>

                    <v-row v-if="!item.disabled">
                      <v-col>
                        <v-icon size="x-small" v-if="item.icon" :icon="item.icon"></v-icon>{{item.menuName}}
                      </v-col>
                      <v-col class="text-center" :style="'margin-left:' + (item.level-1) * -24 + 'px;'">
                        {{item.orderNum}}
                      </v-col>
                      <v-col>
                        {{item.url}}
                      </v-col>
                      <v-col class="text-center">
                        {{item.createTime}}
                      </v-col>
                      <v-col class="text-center">
                        <a class="mr-2" @click.stop="openWinDrawer(item.menuId, item.menuName)" v-if="item.level > 1">{{$t('功能权限')}}</a>
                        <a class="mr-2" @click.stop="openFormDialog($t('修改')+$t('菜单'), item.menuId)" shiro:hasPermission="/system/menu/update">{{$t('修改')}}</a>
                        <v-btn-confirm :data="item" @confirm="doDelete" shiro:hasPermission="/system/menu/del"></v-btn-confirm>
                      </v-col>
                    </v-row>
                  </template>
                </v-treeview>
              </v-col>
            </v-row>
            <v-row>
              <v-col class="text-center" v-text="noDataText" v-if="datatable.items.length < 2"/>
            </v-row>
          </v-sheet>

          <!-- 数据表单模态窗口 -->
          <v-dialog v-model="winDialog" persistent :fullscreen="isMobile" width="800">
            <tform as="v-form" ref="dataForm" class="fill-height" @submit="doSubmit">
              <v-card :loading="posting">
                <v-toolbar color="indigo" :title="$t(dialogTitle)">
                  <v-btn icon="mdi-close" @click="closeFormDialog"></v-btn>
                </v-toolbar>
                <v-card-text class="overflow-auto">
                  <!-- 数据表单 -->
                  <tfield v-model="formData.parentId" name="父菜单" v-slot="{ field, errors }" rules="required">
                    <v-select v-bind="field" :model-value="field.value" clearable :error-messages="errors" :items="topMenus" item-value="menuId" item-title="menuName" :label="$t('父菜单')"></v-select>
                  </tfield>
                  <tfield v-model.trim="formData.menuName" name="菜单名称" v-slot="{ field, errors }" rules="required|max:30">
                    <v-text-field v-bind="field" :model-value="field.value" clearable v-blank type="text" :error-messages="errors" :label="$t('菜单名称')" class="mt-1"></v-text-field>
                  </tfield>
                  <tfield v-model.trim="formData.icon" name="图标" v-slot="{ field, errors }" rules="alpha_dash|max:30">
                    <v-text-field v-bind="field" :model-value="field.value" clearable v-blank type="text" :error-messages="errors" :label="$t('图标')" class="mt-1" v-show="!childFlag"></v-text-field>
                  </tfield>
                  <tfield v-model.trim="formData.url" name="URL" v-slot="{ field, errors }" rules="max:100">
                    <v-text-field v-bind="field" :model-value="field.value" clearable v-blank type="text" :error-messages="errors" :label="$t('请求地址')" class="mt-1" v-show="childFlag"></v-text-field>
                  </tfield>
                  <v-select v-model.trim="formData.target" :items="[{value:'_self', title:'本窗口'},{value:'_blank', title:'新窗口'}]" :label="$t('打开方式')" v-show="childFlag"></v-select>
                  <tfield v-model.trim="formData.orderNum" name="排序" v-slot="{ field, errors }" rules="required|integer|min_value:1|max_value:9999">
                    <v-text-field v-bind="field" :model-value="field.value" clearable type="number" :error-messages="errors" :label="$t('排序')" class="mt-1"></v-text-field>
                  </tfield>
                  <tfield v-model.trim="formData.remark" name="备注" v-slot="{ field, errors }" rules="max:200">
                    <v-textarea v-bind="field" :model-value="field.value" clearable v-blank :error-messages="errors" :label="$t('备注')" class="mt-1"></v-textarea>
                  </tfield>
                </v-card-text>
                <v-divider></v-divider>
                <v-card-actions>
                  <v-btn size="large" variant="elevated" color="primary" type="submit" :loading="posting">{{$t('保存')}}</v-btn>
                </v-card-actions>
              </v-card>
            </tform>
          </v-dialog>

          <!--全屏Loading提示-->
          <v-loading :value="overlay"></v-loading>
        </v-container>
      </v-main>

      <!--/* 导入功能权限管理代码片段 */-->
      <th:block th:replace="~{system/menu/menu-func :: func}"/>
    </v-app>
  </div>

  <!-- 导入Vuetify扩展组件 -->
  <th:block th:replace="~{assets/vuetify :: v-loading}"/>
  <th:block th:replace="~{assets/vuetify :: v-btn-confirm}"/>

  <!-- 业务js -->
  <script type="text/javascript" th:src="@{/js/system/menu/menu.js?_t=#buildtime#}"></script>
  <script type="text/javascript">
    // 初始化Vue
    const app = Vue.createApp({
      extends: baseApp,
      mixins: [menuMixin, funcMixin]
    });
    const appInstance = baseApp.uses(app).mount('#app');
  </script>
</body>
</html>
