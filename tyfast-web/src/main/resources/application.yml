#项目相关配置
ty:
  initPassword: 123456 #用户的初始密码
  autoLoginKey: "AUTO-LOGIN" #自动登录账户字典Key
  siteKey: "SITE" #站点动态配置字典Key
  lang: lang #本地化语言的Cookie标识
  langList: #语言列表
    - {"text":"简体中文","value":"zh-CN"}
    - {"text":"English","value":"en-US"}
    - {"text":"日本語","value":"ja-JP"}
  icp: ICP备2026******号-1 #网站ICP备案号
  copyright: "2026 XX智能科技有限公司" #Copyright
  ysOpenUrl: "https://open.ys7.com/api/lapp/token/get" #萤石开放平台

#默认使用生产环境配置
#https://spring.io/blog/2020/08/14/config-file-processing-in-spring-boot-2-4
spring:
  profiles:
    include: shiro-rules,view-mapping
    active: prod